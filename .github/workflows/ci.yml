# CI: one workflow. Merges are gated by the secret scan, the `unit` and
# `shell` CTest labels on all three OSes, and qmllint on Linux. Performance and
# xvfb GUI runs stay informational, because loaded shared runners make timings
# advisory and xvfb cannot deliver real window focus. v* tags run the packaging
# steps into a draft release; a manual workflow_dispatch runs the same steps as
# a dry-run, uploading the artifacts to the run instead of publishing them.
#
# The `shell` label is a gate rather than a smoke test: those suites load the
# production resources.qrc, so they are what stops a QML syntax error, a
# missing resource or an unresolvable import from merging green. They ran
# under continue-on-error until the release review pointed out that every
# required check could pass with a shell that does not load.
#
# Third-party actions are pinned by commit SHA, and the packaging/signing job
# runs through the protected "release" environment so a compromised PR cannot
# reach signing credentials.
#
# The local acceptance gate for the UI suites remains DISPLAY=:0
# ./build.sh --test on a rested real display (CONTRIBUTING.md): CI protects
# correctness, the local gate protects the UI suites.
name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  # Manual packaging dry-run. The three package jobs also run on a
  # workflow_dispatch, without the protected release environment or a draft
  # release: they build the artifacts, run their license and self-test gates,
  # and upload the result as downloadable run artifacts. This is for iterating
  # on the packaging scripts (the macOS DMG in particular is unproven on real
  # hardware) before committing to a v* tag. macOS stays unsigned here, because
  # the signing secrets live in the release environment a dispatch does not
  # enter.
  workflow_dispatch:
    inputs:
      version:
        description: "Version stamped on the artifacts (SemVer; numeric core must equal PROJECT_VERSION, e.g. 1.0.0-rc1)."
        default: "1.0.0-rc1"
      platforms:
        description: "Which platform(s) to package."
        type: choice
        default: all
        options: [all, linux, windows, macos]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  QT_VERSION: "6.10.1"

jobs:
  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            preset: linux-release
            shell-preset: shell-linux
            test-preset: unit-linux
            qt-arch: linux_gcc_64
          # windows-2022, not windows-latest: since the windows-2025-vs2026
          # image, windows-latest ships Visual Studio 2026, and the
          # windows-msvc-release preset pins the "Visual Studio 17 2022"
          # generator to match the Qt msvc2022_64 kit installed below and
          # the toolchain the port was developed against. Moving to VS 2026
          # is a deliberate toolchain change, not a runner-label default.
          - os: windows-2022
            preset: windows-msvc-release
            shell-preset: shell-windows
            test-preset: unit-windows
            qt-arch: win64_msvc2022_64
          - os: macos-14
            preset: macos-release
            shell-preset: shell-macos
            test-preset: unit-macos
            qt-arch: clang_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-dev \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libfontconfig1 xvfb tesseract-ocr

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt-arch }}
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j 4

      # The merge gate: deterministic, headless-safe unit suites.
      - name: Unit tests (gate)
        env:
          # Not offscreen on Windows: that QPA plugin ships no fonts, so every
          # text metric collapses to zero and the text-diagram suites fail
          # (the same finding that scoped the TextDiagram ctest property to
          # non-Windows). The windows plugin runs headless on the runner.
          QT_QPA_PLATFORM: ${{ runner.os == 'Windows' && 'windows' || 'offscreen' }}
        run: ctest --preset ${{ matrix.test-preset }} --output-on-failure

      # --output-on-failure prints nothing for a failing suite on the Windows
      # runner: the child's output does not reach the step log there, so a
      # Windows-only failure arrives as a suite name and nothing else. CTest
      # writes the same output to a file whatever the platform, so the file is
      # what gets printed when the gate fails.
      - name: Test log for a failing gate
        if: failure()
        shell: bash
        run: |
          log=build-${{ matrix.preset }}/Testing/Temporary/LastTest.log
          if [ -f "$log" ]; then tail -c 200000 "$log"; else echo "no $log"; fi

      # Non-blocking trend data; loaded shared runners make timings advisory.
      - name: Performance tests (informational)
        if: runner.os == 'Linux'
        continue-on-error: true
        env:
          QT_QPA_PLATFORM: offscreen
        # Ends in a notice rather than a bare failing command: the budgets
        # here defer on CI and only the wall-clock ones can flag, on runner
        # capacity rather than a regression, so a non-zero exit is expected and
        # should read as a notice rather than the red error a tolerated failure
        # otherwise leaves on a green run. continue-on-error stays as the
        # backstop if the command fails before ctest runs.
        run: |
          ctest --test-dir build-${{ matrix.preset }} -L performance --output-on-failure \
            || echo "::notice::performance budgets flagged on the shared runner (informational; timings are advisory here)"

      # The second merge gate, alongside the unit suites. ShellTests loads the
      # production resources.qrc — the shipped main.qml, not the integration
      # suite's mirror of it — with the real context properties attached, so
      # it is the only check that a QML syntax error, a file missing from the
      # qrc, an unresolvable import or a renamed context property cannot merge
      # green. It ran under continue-on-error before, which meant it could
      # not. It is deterministic offscreen and takes under a second, so it
      # blocks on every OS rather than Linux alone.
      - name: Shell tests (gate)
        env:
          QT_QPA_PLATFORM: ${{ runner.os == 'Windows' && 'windows' || 'offscreen' }}
        run: ctest --preset ${{ matrix.shell-preset }} --output-on-failure

      # Encodes the ruled local-gate policy: xvfb cannot deliver real focus,
      # so the Qt Quick suites never gate merges from CI.
      - name: Qt Quick integration under xvfb (informational)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          xvfb-run -a ctest --test-dir build-${{ matrix.preset }} -L visual --output-on-failure \
            || echo "::notice::Qt Quick suites cannot get real focus under xvfb (informational; the local rested-display run is the gate)"

      - name: License header check
        if: runner.os == 'Linux'
        run: tools/apply-license-headers.sh --check

      - name: Notices freshness check
        if: runner.os == 'Linux'
        run: |
          pip install pyyaml
          tools/generate-notices.py --check

      # Text scans and gitleaks never look inside an image; this OCRs the
      # shipped rasters so a leaked path or the old product name rendered into
      # a screenshot cannot ship. The press stills are reproducible from a
      # checked-in demo vault (tools/capture-press-stills.sh).
      - name: Screenshot leak scan
        if: runner.os == 'Linux'
        run: tools/check-image-leaks.sh

  # Static QML analysis, blocking. Complements the runtime ShellTests gate
  # above: qmllint reads every file in qml/, including the ones no test
  # happens to instantiate, and rejects malformed QML, an import that does
  # not resolve and a use of a type that does not exist. Its own README is
  # the header comment of tools/run-qmllint.sh, which explains why the
  # context-property categories are switched off.
  qmllint:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: linux_gcc_64
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      # qmllint reads the `Kvit` module's type description from the build
      # tree, where qmltyperegistrar writes it from the QML_ELEMENT macros on
      # the C++ classes. Only that generator has to run, not a compile, so
      # this stays a configure plus one small target rather than a build of
      # the editor.
      #
      # This replaced a checker script that compared a hand-written stub
      # against the imperative registrations in AppContext. Generated
      # metadata cannot drift from the C++, so there is nothing left to
      # check.
      #
      # `kvit-qmltypes` is this project's own name for that generator. Qt's
      # generated target is named after whichever target carries the QML
      # module, so it moves when the module does — this job used to build
      # `kvit-core_qmltyperegistration`, which stopped existing when the
      # module moved to kvit-qml, and the step failed before the lint script
      # ever ran. The alias in CMakeLists.txt is stable, so this cannot
      # happen again.
      - name: Generate the Kvit QML type description
        run: |
          cmake -S . -B build
          cmake --build build --target kvit-qmltypes

      # The `qmllint` target runs tools/run-qmllint.sh with KVIT_BUILD_DIR
      # already pointing at this build tree, over the shipping QML and the
      # test QML both.
      - name: qmllint
        run: cmake --build build --target qmllint

  # Optional CMake targets, built but not run. Everything off by default is
  # invisible to every other job, so a change elsewhere can break one and
  # nothing notices until somebody reaches for the tool. That has now happened
  # twice: narrowing kvit-core's public link surface broke kvit-uidriver,
  # which constructs its own QApplication, and no routine build compiles it.
  #
  # kvit-uidriver matters more than its size suggests. Under WSLg an X11 grab
  # of the shell comes back blank, so driving the real UI through this tool is
  # the only way to observe what the GPU path actually renders - it is the
  # instrument for the glyph-corruption bug class devel.md describes. It being
  # broken is discovered at the worst moment, by someone already debugging
  # something else.
  #
  # Compiling is the whole check. Running it needs a display, which is what
  # the visual suites are for.
  optional-targets:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: linux_gcc_64
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      - name: Configure with every optional target on
        run: cmake -S . -B build-optional -DKVIT_UI_DRIVER=ON

      - name: Build kvit-uidriver
        run: cmake --build build-optional --target kvit-uidriver --parallel

  # AddressSanitizer + UndefinedBehaviorSanitizer over the deterministic
  # suites. Complements the other two gates by kind rather than by coverage:
  # ShellTests and qmllint check that the application is wired correctly,
  # while this checks that the C++ underneath it is memory- and
  # UB-clean while the same tests run.
  #
  # It is informational for now. The suites pass under it locally, but the
  # instrumentation is new to this repo and shared runners are slower and
  # more loaded than a workstation; a first failure should be read and
  # triaged rather than block an unrelated merge. Flip continue-on-error off
  # once it has a few weeks of green history.
  #
  # The timeout is 120 minutes because 60 was not enough: the first hosted
  # attempt was killed mid-build. The instrumented tree takes roughly twice
  # as long to compile as the ordinary one and the runner has two cores,
  # against the 28 the same build has locally.
  sanitizers:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev \
                                  libxkbcommon-x11-0 libegl1

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: linux_gcc_64
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      - name: Configure
        run: |
          cmake -S . -B build-asan -DKVIT_SANITIZE=ON \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo

      # --parallel 2, not the runner's four: the instrumented build was killed
      # with SIGTERM six minutes in, which is the out-of-memory killer rather
      # than the job timeout. Compiling with ASan and UBSan costs far more
      # memory per translation unit, and four of them at once do not fit in a
      # standard runner. Two do, and the job has 120 minutes to use.
      - name: Build
        run: cmake --build build-asan --parallel 2

      # Qt's own libraries are not instrumented, so their allocations look
      # like leaks to LSan; detect_leaks=0 keeps the run about memory errors
      # and undefined behaviour in this codebase. halt_on_error=1 makes the
      # first report fail the step rather than scroll past.
      - name: Unit and shell suites under ASan/UBSan
        env:
          QT_QPA_PLATFORM: offscreen
          QT_QUICK_BACKEND: software
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        # The instrumentation roughly doubles measured time, so no timing
        # budget calibrated on an ordinary build means anything here. The
        # budgets know it themselves — tests/timingbudget.h reports the
        # measurement and asserts nothing when KVIT_SANITIZER_BUILD is
        # defined — so every suite runs and this job reports memory errors
        # and undefined behaviour only. That replaces excluding the two
        # heaviest suites by name, which also lost their ASan coverage.
        run: |
          ctest --test-dir build-asan -L unit --output-on-failure
          ctest --test-dir build-asan -L shell --output-on-failure

  # Linux packaging (AppImage). On a v* tag it produces the artifact into a
  # draft release for inspection through the protected release environment;
  # publishing the release is a manual step of the release procedure
  # (docs/release-rollback.md). On a manual workflow_dispatch it skips that
  # environment and uploads the AppImage as a downloadable run artifact.
  package:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux'))
    needs: [secret-scan, build-test, qmllint, optional-targets]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # No protected environment on a manual dry-run: it publishes no release and
    # needs no signing secrets. A tag push keeps the release gate.
    environment: ${{ github.event_name != 'workflow_dispatch' && 'release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Validate the version before anything is built, so a bad one costs
      # seconds rather than a full packaging run. On a tag the version is the
      # tag; on a manual run it is the `version` input. Either way it must be a
      # SemVer string whose numeric core equals PROJECT_VERSION, with the
      # prerelease suffix preserved so an RC identifies itself as an RC.
      # build-appimage.sh applies the same rules and derives the same value;
      # this step surfaces a mismatch early and publishes it for the steps below.
      - name: Validate release version against PROJECT_VERSION
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            SRC="workflow_dispatch input"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            SRC="tag ${GITHUB_REF_NAME}"
          fi
          BASE=$(grep -oP 'project\(kvit-notes VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' (from $SRC) is not SemVer (expected 1.0.0 or 1.0.0-rc1)."
            exit 1
          fi
          if [[ "$VERSION" != "$BASE" && "$VERSION" != "$BASE"-* && "$VERSION" != "$BASE"+* ]]; then
            echo "::error::Version '$VERSION' (from $SRC) has base '${VERSION%%[-+]*}' but CMakeLists.txt declares '$BASE'."
            exit 1
          fi

          # Any suffix at all means this is not the final release.
          if [ "$VERSION" = "$BASE" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging $VERSION (base $BASE, from $SRC)"

      - name: Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-dev \
            libxkbcommon-x11-0 libxcb-cursor0 libfontconfig1 \
            libfuse2t64 file sqlite3

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: linux_gcc_64
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      # The script configures the preset itself, so a fresh checkout is all it
      # needs. It verifies the linuxdeploy downloads against pinned SHA-256
      # digests before executing them, refuses to produce an artifact whose
      # license payload is incomplete, and finally runs the packed AppImage
      # (tools/check-appimage.sh) to prove the math resources, QML imports,
      # SQLite FTS5 index and image plugins work in the packaged runtime.
      # sqlite3 above is what inspects the index the probe run builds.
      - name: Build AppImage
        env:
          KVIT_VERSION_FULL: ${{ steps.version.outputs.version }}
        run: packaging/linux/build-appimage.sh

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      # Pin the AUR -bin package to the artifact this run produced, and fail
      # if the two disagree. The PKGBUILD carries a placeholder digest until
      # this runs, so it can never publish with verification disabled.
      - name: Pin the AUR package to the release artifact
        run: |
          tools/update-aur-digest.sh "${{ steps.version.outputs.version }}" dist/SHA256SUMS.txt
          tools/update-aur-digest.sh --check "${{ steps.version.outputs.version }}" dist/SHA256SUMS.txt
          cp packaging/aur/kvit-notes-bin/PKGBUILD dist/PKGBUILD.aur

      # `prerelease` comes from the version check rather than a substring
      # test: any SemVer suffix marks a prerelease, so 1.0.0-beta.1 and
      # 1.0.0-rc1 are both flagged, and the binary inside reports the same
      # suffixed version rather than claiming to be the final release.
      - name: Draft release with artifacts
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            dist/*
            THIRD-PARTY-NOTICES.md

      # Manual dry-run: no release, just downloadable run artifacts.
      - name: Upload artifacts (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-${{ steps.version.outputs.version }}
          path: |
            dist/*
            THIRD-PARTY-NOTICES.md
          if-no-files-found: error

  # Tag-triggered Windows packaging: the windeployqt portable zip and the Inno
  # Setup per-user installer, uploaded into the same draft release as the Linux
  # artifacts. It runs in the same protected release environment, so it takes
  # its own manual approval. The macOS DMG is the package-macos job below.
  package-windows:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows'))
    needs: [secret-scan, build-test, qmllint, optional-targets]
    runs-on: windows-2022
    timeout-minutes: 90
    environment: ${{ github.event_name != 'workflow_dispatch' && 'release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # The same rule as the Linux package job, in PowerShell: on a tag the
      # version is the tag, on a manual run it is the `version` input, and
      # either way its numeric core must equal PROJECT_VERSION with any SemVer
      # suffix marking a prerelease. build-windows.ps1 re-derives and re-checks
      # the same value; this surfaces a mismatch early and feeds the steps below.
      - name: Validate release version against PROJECT_VERSION
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'
            $src = 'workflow_dispatch input'
          } else {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
            $src = "tag $($env:GITHUB_REF_NAME)"
          }
          $m = Select-String -Path CMakeLists.txt -Pattern 'project\(kvit-notes VERSION (\d+\.\d+\.\d+)'
          $base = $m.Matches[0].Groups[1].Value
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            Write-Host "::error::Version '$version' (from $src) is not SemVer (expected 1.0.0 or 1.0.0-rc1)."
            exit 1
          }
          if ($version -ne $base -and $version -notmatch ('^' + [regex]::Escape($base) + '[-+]')) {
            Write-Host "::error::Version '$version' (from $src) base differs from CMakeLists.txt '$base'."
            exit 1
          }
          $prerelease = if ($version -eq $base) { 'false' } else { 'true' }
          "version=$version"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaging $version (base $base, from $src)"

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2022_64
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Configures and installs the windows-msvc-release preset, deploys Qt and
      # the MSVC runtime, verifies the license payload and a headless
      # --math-selftest, then writes the zip, the installer, and the checksums
      # into dist/.
      - name: Build Windows package
        shell: pwsh
        env:
          KVIT_VERSION_FULL: ${{ steps.version.outputs.version }}
        run: ./packaging/windows/build-windows.ps1

      - name: Draft release with artifacts
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: dist/*

      - name: Upload artifacts (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error

  # macOS packaging: the macdeployqt bundle inside a compressed DMG. On a v*
  # tag it uploads into the same draft release as the Linux and Windows
  # artifacts, through the protected release environment. On a manual
  # workflow_dispatch it skips that environment and uploads the DMG as a
  # downloadable run artifact instead.
  #
  # Signing and notarization are gated on credentials. On a dispatch there is no
  # release environment, so its secrets are absent and the DMG is always
  # ad-hoc-signed. On a tag, until the Apple Developer account is active the
  # secrets are still empty, so build-macos.sh produces a complete,
  # self-contained, ad-hoc-signed DMG and skips notarization; the packaging
  # mechanism is exercised end to end regardless. To enable signing at launch,
  # add a step before "Build macOS package" that imports the Developer ID
  # Application certificate into a temporary keychain and stores a notarytool
  # profile, then set KVIT_CODESIGN_IDENTITY and KVIT_NOTARY_KEYCHAIN_PROFILE
  # from the release-environment secrets. The empty defaults below take the
  # unsigned path today and the signed path unchanged once the secrets exist.
  package-macos:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos'))
    needs: [secret-scan, build-test, qmllint, optional-targets]
    runs-on: macos-14
    timeout-minutes: 90
    environment: ${{ github.event_name != 'workflow_dispatch' && 'release' || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # The same rule as the other package jobs: on a tag the version is the
      # tag, on a manual run it is the `version` input, and either way its
      # numeric core must equal PROJECT_VERSION with any SemVer suffix marking a
      # prerelease. build-macos.sh re-derives and re-checks the same value.
      - name: Validate release version against PROJECT_VERSION
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            SRC="workflow_dispatch input"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            SRC="tag ${GITHUB_REF_NAME}"
          fi
          BASE=$(grep -oE 'project\(kvit-notes VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' (from $SRC) is not SemVer (expected 1.0.0 or 1.0.0-rc1)."
            exit 1
          fi
          if [[ "$VERSION" != "$BASE" && "$VERSION" != "$BASE"-* && "$VERSION" != "$BASE"+* ]]; then
            echo "::error::Version '$VERSION' (from $SRC) has base '${VERSION%%[-+]*}' but CMakeLists.txt declares '$BASE'."
            exit 1
          fi
          if [ "$VERSION" = "$BASE" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging $VERSION (base $BASE, from $SRC)"

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: clang_64
          modules: qtmultimedia qtshadertools qtimageformats
          cache: true

      # Configures and installs the macos-release preset, bundles Qt with
      # macdeployqt and the offscreen plugin, verifies the license payload and a
      # headless --math-selftest, then writes the DMG and the checksum into
      # dist/. Signing and notarization are skipped when their env vars are
      # empty (see the job comment above).
      - name: Build macOS package
        env:
          KVIT_VERSION_FULL: ${{ steps.version.outputs.version }}
          KVIT_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          KVIT_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.MACOS_NOTARY_KEYCHAIN_PROFILE }}
        run: ./packaging/macos/build-macos.sh

      - name: Draft release with artifacts
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: dist/*

      - name: Upload artifacts (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-${{ steps.version.outputs.version }}
          path: dist/*
          if-no-files-found: error
