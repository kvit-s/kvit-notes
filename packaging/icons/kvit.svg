<?xml version="1.0" encoding="UTF-8"?>
<!-- Kvit Notes application icon. First-party artwork, MPL-2.0 (see the
     dependency manifest packaging/sbom.yaml). Geometry only - no text glyphs,
     so it renders identically without font dependencies at every size.
     The mark is an abstract "K": one upright block bar and two accent bars,
     echoing the block-editor model; accent #4a90d9 is the light theme's
     accent token (src/theme.cpp). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3a57"/>
      <stop offset="1" stop-color="#122638"/>
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>
  <!-- upright bar -->
  <line x1="178" y1="150" x2="178" y2="362" stroke="#f4f7fa"
        stroke-width="58" stroke-linecap="round"/>
  <!-- upper diagonal -->
  <line x1="330" y1="152" x2="212" y2="256" stroke="#4a90d9"
        stroke-width="58" stroke-linecap="round"/>
  <!-- lower diagonal -->
  <line x1="212" y1="256" x2="330" y2="360" stroke="#6fb1ea"
        stroke-width="58" stroke-linecap="round"/>
</svg>
